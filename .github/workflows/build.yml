name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup .NET environment
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.100"

      - name: Install Thunderstore CLI
        run: |
          dotnet tool install -g tcli

      - name: Build
        run: |
          tcli build --package-version "0.0.${{ github.run_number }}"

      - name: Publish to Thunderstore (dev)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          TCLI_AUTH_TOKEN: ${{ secrets.THUNDERSTORE_API_KEY }}
        run: |
          sed 's/name = "Agent_Modpack"/name = "Agent_Modpack_TESTING"/' thunderstore.toml > thunderstore.testing.toml
          sed -i 's|readme = "README.md"|readme = "README_TESTING.md"|' thunderstore.testing.toml
          tcli publish --config-path thunderstore.testing.toml --package-version "0.0.${{ github.run_number }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: thunderstore
          path: ./dist/*
          retention-days: 7
