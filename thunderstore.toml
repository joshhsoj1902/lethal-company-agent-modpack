[config]
schemaVersion = "0.0.1"

[general]
repository = "https://thunderstore.io"

[package]
namespace = "joshhsoj1902"
name = "Agent_Modpack"
description = "A modpack used by the agents"
websiteUrl = "https://github.com/joshhsoj1902/lethal-company-agent-modpack"
containsNsfwContent = false

[build]
icon = "icon.png"
readme = "README.md"
outdir = "dist"

[[build.copy]]
source = "CHANGELOG.md"
target = "/"

[[build.copy]]
source = "BepInEx"
target = "/BepInEx"

[publish]
communities = [ "lethal-company", ]
categories = ["modpacks"]

[package.dependencies]
